<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc"><title id="title">Onyx AI Voice Dispatcher</title><desc id="desc">Futuristic AI voice dispatcher interface with glowing assistant orb, call waveform, lead qualification, booking, and dispatch automation cards.</desc><defs><radialGradient id="orb" cx="50%" cy="48%" r="55%"><stop stop-color="#e0f2fe"/><stop offset=".32" stop-color="#22d3ee"/><stop offset=".72" stop-color="#2563eb"/><stop offset="1" stop-color="#0f172a"/></radialGradient><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#020617"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="900" height="520" rx="34" fill="url(#bg)"/><rect x="28" y="28" width="844" height="464" rx="28" fill="#071827" stroke="#155e75" stroke-width="2"/><text x="60" y="72" fill="#ecfeff" font-family="Inter,Arial" font-size="24" font-weight="800">ONYX AI — VOICE INTELLIGENCE</text><text x="60" y="100" fill="#67e8f9" font-family="Inter,Arial" font-size="13" letter-spacing="3">CALL INTAKE · LEAD QUALIFICATION · AUTO DISPATCH</text><circle cx="450" cy="250" r="112" fill="url(#orb)" filter="url(#glow)"/><circle cx="450" cy="250" r="148" fill="none" stroke="#22d3ee" stroke-width="2" opacity=".45"/><circle cx="450" cy="250" r="188" fill="none" stroke="#38bdf8" stroke-width="1" opacity=".2"/><text x="404" y="260" fill="#020617" font-family="Inter,Arial" font-size="30" font-weight="900">ONYX</text><path d="M254 252 q18 -68 36 0 t36 0 t36 0" fill="none" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/><path d="M536 252 q18 -68 36 0 t36 0 t36 0" fill="none" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/><g transform="translate(70 150)"><rect width="220" height="80" rx="18" fill="#082f49" stroke="#38bdf8"/><text x="18" y="32" fill="#bae6fd" font-family="Inter,Arial" font-size="13">INBOUND CALL</text><text x="18" y="60" fill="#fff" font-family="Inter,Arial" font-size="21" font-weight="800">Tow Request</text></g><g transform="translate(610 150)"><rect width="220" height="80" rx="18" fill="#052e2b" stroke="#14b8a6"/><text x="18" y="32" fill="#99f6e4" font-family="Inter,Arial" font-size="13">QUALIFIED LEAD</text><text x="18" y="60" fill="#fff" font-family="Inter,Arial" font-size="21" font-weight="800">Ready to Book</text></g><g transform="translate(70 315)"><rect width="220" height="80" rx="18" fill="#2a1705" stroke="#f59e0b"/><text x="18" y="32" fill="#fde68a" font-family="Inter,Arial" font-size="13">AUTO DISPATCH</text><text x="18" y="60" fill="#fff" font-family="Inter,Arial" font-size="21" font-weight="800">Driver Assigned</text></g><g transform="translate(610 315)"><rect width="220" height="80" rx="18" fill="#111827" stroke="#64748b"/><text x="18" y="32" fill="#cbd5e1" font-family="Inter,Arial" font-size="13">STATUS UPDATE</text><text x="18" y="60" fill="#fff" font-family="Inter,Arial" font-size="21" font-weight="800">SMS Sent</text></g></svg>
