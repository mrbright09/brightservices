fff" font-family="Inter,Arial" font-size="38" font-weight="800">2</text><text x="72" y="76" fill="#fbbf24" font-family="Inter,Arial" font-size="14">review needed</text></g><g transform="translate(76 272)"><line x1="0" y1="142" x2="706" y2="142" stroke="#334155"/><line x1="0" y1="96" x2="706" y2="96" stroke="#1e293b"/><line x1="0" y1="48" x2="706" y2="48" stroke="#1e293b"/><path d="M0 124 L112 98 L224 106 L336 64 L448 76 L560 36 L706 50" fill="none" stroke="url(#line)" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/><g fill="#22d3ee"><circle cx="0" cy="124" r="7"/><circle cx="112" cy="98" r="7"/><circle cx="224" cy="106" r="7"/><circle cx="336" cy="64" r="7"/><circle cx="448" cy="76" r="7"/><circle cx="560" cy="36" r="7"/><circle cx="706" cy="50" r="7"/></g><text x="0" y="176" fill="#94a3b8" font-family="Inter,Arial" font-size="13">Mon</text><text x="112" y="176" fill="#94a3b8" font-family="Inter,Arial" font-size="13">Tue</text><text x="224" y="176" fill="#94a3b8" font-family="Inter,Arial" font-size="13">Wed</text><text x="336" y="176" fill="#94a3b8" font-family="Inter,Arial" font-size="13">Thu</text><text x="448" y="176" fill="#94a3b8" font-family="Inter,Arial" font-size="13">Fri</text><text x="560" y="176" fill="#94a3b8" font-family="Inter,Arial" font-size="13">Sat</text><text x="690" y="176" fill="#94a3b8" font-family="Inter,Arial" font-size="13">Sun</text></g></svg>
