<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
<title id="title">BFT Freight Command Dashboard</title><desc id="desc">Realistic freight dashboard showing flatbed truck, route data, AI pricing, load status, and revenue cards.</desc>
