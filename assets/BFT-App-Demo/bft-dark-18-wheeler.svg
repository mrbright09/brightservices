  <path d="M568 120h674c37 0 68 30 68 68v198H536V156c0-20 14-36 32-36z" fill="url(#black)" stroke="#40566d" stroke-width="4"/>
  <path d="M592 145h642c21 0 38 17 38 38v169H592z" fill="#090f18" stroke="#1d334c" stroke-width="3"/>
  <g opacity=".2" stroke="#86b7dd"><path d="M650 151v200M730 151v200M810 151v200M890 151v200M970 151v200M1050 151v200M1130 151v200M1210 151v200"/></g>
