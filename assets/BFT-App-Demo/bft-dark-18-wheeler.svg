  <text x="823" y="300" font-family="Arial,sans-serif" font-size="29" fill="#e9f4ff" font-weight="800">FREIGHT SOLUTIONS</text>
  <g fill="#dbe6ef" opacity=".9"><rect x="617" y="371" width="25" height="6"/><rect x="701" y="371" width="25" height="6"/><rect x="785" y="371" width="25" height="6"/><rect x="869" y="371" width="25" height="6"/><rect x="953" y="371" width="25" height="6"/><rect x="1037" y="371" width="25" height="6"/><rect x="1121" y="371" width="25" height="6"/><rect x="1205" y="371" width="25" height="6"/></g>
