    <circle cx="460" cy="397" r="65" fill="#020409"/><circle cx="460" cy="397" r="42" fill="url(#chrome)"/><circle cx="460" cy="397" r="22" fill="#0c1117"/>
    <circle cx="555" cy="397" r="65" fill="#020409"/><circle cx="555" cy="397" r="42" fill="url(#chrome)"/><circle cx="555" cy="397" r="22" fill="#0c1117"/>
