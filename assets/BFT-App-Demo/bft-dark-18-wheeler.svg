<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
<title id="title">BFT black electric blue 18 wheeler freight truck</title>
<desc id="desc">A realistic vector-style black 18 wheeler with electric blue BFT branding on the trailer.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#020817"/><stop offset="1" stop-color="#061b32"/></linearGradient>
  <linearGradient id="black" x1="0" x2="1"><stop stop-color="#03050a"/><stop offset=".5" stop-color="#161d28"/><stop offset="1" stop-color="#05070c"/></linearGradient>
  <linearGradient id="blue" x1="0" x2="1"><stop stop-color="#00c8ff"/><stop offset=".5" stop-color="#0078ff"/><stop offset="1" stop-color="#003bff"/></linearGradient>
  <linearGradient id="chrome" x1="0" x2="1"><stop stop-color="#f8fbff"/><stop offset=".35" stop-color="#6d7a83"/><stop offset=".75" stop-color="#dbe6ef"/><stop offset="1" stop-color="#303b45"/></linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000" flood-opacity=".6"/></filter>
</defs>
<rect width="1400" height="520" rx="34" fill="url(#bg)"/>
<g opacity=".17" stroke="#0d8dff" stroke-width="1"><path d="M70 90H1330M70 170H1330M70 250H1330M70 330H1330M70 410H1330"/><path d="M160 55V455M300 55V455M440 55V455M580 55V455M720 55V455M860 55V455M1000 55V455M1140 55V455M1280 55V455"/></g>
<ellipse cx="735" cy="433" rx="560" ry="34" fill="#001c3a" opacity=".86" filter="url(#glow)"/>
