  <path d="M268 156h142c45 0 78 32 89 83l8 39H203c14-56 36-99 65-122z" fill="#081522" stroke="#55708a" stroke-width="3"/>
  <path d="M295 165h93c34 0 64 25 72 62l7 33H242c11-45 27-78 53-95z" fill="#092538" stroke="#11344f" stroke-width="3"/>
  <path d="M96 329h179c44 0 80 35 80 80H85z" fill="#05070c" stroke="#344d65" stroke-width="3"/>
  <rect x="117" y="277" width="92" height="104" rx="16" fill="url(#chrome)"/>
  <rect x="133" y="291" width="60" height="75" rx="10" fill="#05070c" stroke="#dbe6ef" stroke-width="3"/>
  <path d="M139 291v75M162 291v75M186 291v75" stroke="#e6f3ff" stroke-width="3" opacity=".75"/>
  <path d="M229 318l113-8 31 30-144 11z" fill="#0a1c2d" stroke="#3b607e" stroke-width="3"/>
  <path d="M245 323l91-6 20 17-110 9z" fill="#e9fbff" opacity=".9"/>
  <!-- lights -->
  <g filter="url(#glow)"><rect x="301" y="107" width="156" height="23" rx="9" fill="url(#blue)"/><rect x="319" y="110" width="25" height="17" rx="4" fill="#ff3030"/><rect x="362" y="110" width="25" height="17" rx="4" fill="#e7f9ff"/><rect x="406" y="110" width="25" height="17" rx="4" fill="#0b87ff"/><rect x="1041" y="142" width="45" height="19" rx="7" fill="#ff3030"/><rect x="989" y="142" width="45" height="19" rx="7" fill="#0b87ff"/><path d="M241 342h120" stroke="url(#blue)" stroke-width="7"/></g>
