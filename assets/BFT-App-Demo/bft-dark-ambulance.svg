<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
<title id="title">BFT black electric blue health triage ambulance</title>
<desc id="desc">A realistic vector-style black ambulance with electric blue accents, BFT branding, and health triage markings.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#020817"/><stop offset="1" stop-color="#061b32"/></linearGradient>
  <linearGradient id="black" x1="0" x2="1"><stop stop-color="#03050a"/><stop offset=".55" stop-color="#161d28"/><stop offset="1" stop-color="#05070c"/></linearGradient>
  <linearGradient id="blue" x1="0" x2="1"><stop stop-color="#00c8ff"/><stop offset=".5" stop-color="#0078ff"/><stop offset="1" stop-color="#003bff"/></linearGradient>
  <linearGradient id="chrome" x1="0" x2="1"><stop stop-color="#f8fbff"/><stop offset=".35" stop-color="#6d7a83"/><stop offset=".75" stop-color="#dbe6ef"/><stop offset="1" stop-color="#303b45"/></linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000" flood-opacity=".6"/></filter>
</defs>
<rect width="1400" height="520" rx="34" fill="url(#bg)"/>
<g opacity=".16" stroke="#0d8dff" stroke-width="1"><path d="M60 92H1340M60 174H1340M60 256H1340M60 338H1340M60 420H1340"/><path d="M150 58V458M290 58V458M430 58V458M570 58V458M710 58V458M850 58V458M990 58V458M1130 58V458M1270 58V458"/></g>
<ellipse cx="730" cy="425" rx="530" ry="34" fill="#001c3a" opacity=".85" filter="url(#glow)"/>
<g filter="url(#shadow)">
  <!-- rear ambulance box -->
  <path d="M512 125h610c47 0 85 38 85 85v178H471V166c0-23 18-41 41-41z" fill="url(#black)" stroke="#40566d" stroke-width="4"/>
  <path d="M546 154h541c34 0 62 28 62 62v137H546z" fill="#09111b" stroke="#223a54" stroke-width="3"/>
  <rect x="617" y="183" width="128" height="130" rx="13" fill="#081522" stroke="#4f6e8a" stroke-width="3"/>
  <rect x="784" y="183" width="128" height="130" rx="13" fill="#081522" stroke="#4f6e8a" stroke-width="3"/>
  <path d="M555 292h594" stroke="url(#blue)" stroke-width="15" filter="url(#glow)"/>
  <path d="M555 293c102-47 235-44 367-7 74 21 148 29 227 2v39c-90 29-173 21-269-5-119-32-209-28-325 18z" fill="url(#blue)" opacity=".84"/>
