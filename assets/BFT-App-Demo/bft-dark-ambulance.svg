  <g transform="translate(955 195)"><path d="M41 0v32l27-21 15 20-28 21 28 21-15 20-27-21v32H16V72l-28 21-15-20 28-21-28-21 15-20 28 21V0z" fill="url(#blue)" filter="url(#glow)"/></g>
  <text x="1017" y="247" font-family="Arial Black,Arial,sans-serif" font-size="74" fill="#0b87ff" font-weight="900">BFT</text>
  <text x="1022" y="283" font-family="Arial,sans-serif" font-size="25" fill="#e9f4ff" font-weight="800">HEALTH TRIAGE</text>
  <text x="600" y="243" font-family="Arial Black,Arial,sans-serif" font-size="48" fill="#dfeeff">AI TRIAGE</text>
  <text x="600" y="273" font-family="Arial,sans-serif" font-size="22" fill="#8db9dd">PATIENT ASSESSMENT • PRIORITY ROUTING</text>
  <!-- wheels -->
  <g>
    <circle cx="282" cy="397" r="70" fill="#020409"/><circle cx="282" cy="397" r="46" fill="url(#chrome)"/><circle cx="282" cy="397" r="24" fill="#0c1117"/>
    <circle cx="1010" cy="397" r="70" fill="#020409"/><circle cx="1010" cy="397" r="46" fill="url(#chrome)"/><circle cx="1010" cy="397" r="24" fill="#0c1117"/>
